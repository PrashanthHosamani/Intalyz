{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connecting to {{ provider.name }} — Intalyz.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050810; --blue: #4f9cf9; --txt: #e2e8f0; --txt2: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --grad: linear-gradient(135deg, #4f9cf9 0%, #a78bfa 50%, #6ee7f7 100%);
      --sans: 'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--txt); font-family: var(--sans);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width:500px;height:500px;background:rgba(79,156,249,0.12);top:-200px;right:-100px; }
    .orb-2 { width:400px;height:400px;background:rgba(167,139,250,0.10);bottom:20%;left:-150px;animation-delay:-3s; }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-30px);} }

    .card {
      position: relative; z-index: 5;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      backdrop-filter: blur(24px);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px; width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: card-in 0.4s ease;
    }
    @keyframes card-in { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

    .logo {
      width: 56px; height: 56px; background: var(--grad);
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.5rem; color: #fff;
      box-shadow: 0 8px 32px rgba(79,156,249,0.35);
    }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid rgba(79,156,249,0.2);
      border-top-color: var(--blue);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    p  { font-size: 0.88rem; color: var(--txt2); line-height: 1.6; margin-bottom: 2rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 2rem;
      background: var(--blue); border: none; border-radius: 10px;
      color: #fff; font-family: var(--sans); font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(79,156,249,0.3);
    }
    .btn:hover { background: #6aaeff; transform: translateY(-2px); }

    .back { display: block; margin-top: 1.25rem; font-size: 0.83rem; color: var(--txt2); text-decoration: none; transition: color 0.2s; }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="3"/>
      </svg>
    </div>

    <div class="spinner" id="spinner"></div>

    <h1>Connecting to {{ provider.name }}</h1>
    <p>Redirecting you to {{ provider.name }} to complete sign-in…</p>

    <form method="post" id="googleForm">
      {% csrf_token %}
      <button type="submit" class="btn" id="continueBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with {{ provider.name }}
      </button>
    </form>

    <a href="/accounts/signin/" class="back">← Back to Sign In</a>
  </div>

  <script>
    // Auto-submit so user doesn't have to click twice
    window.addEventListener('load', () => {
      document.getElementById('googleForm').submit();
    });
  </script>
</body>
</html>
